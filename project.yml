name: Skald
options:
  bundleIdPrefix: net.skaldagent
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: F6KK454Z42
    ENABLE_USER_SCRIPT_SANDBOXING: YES

configs:
  Debug: debug
  Release: release

targets:
  Skald:
    type: application
    platform: iOS
    sources:
      - path: SkaldInbox
        excludes:
          - "Resources/Info.plist"
          - "Resources/Skald.entitlements"
    resources:
      - path: SkaldInbox/Resources/Assets.xcassets
      - path: SkaldInbox/Resources/Localizable.xcstrings
      - path: SkaldInbox/Resources/InfoPlist.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.skaldagent.inbox
        PRODUCT_NAME: Skald
        INFOPLIST_FILE: SkaldInbox/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SkaldInbox/Resources/Skald.entitlements
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    dependencies:
      - target: NotificationServiceExtension
        embed: true
        codeSign: false

  NotificationServiceExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: NotificationServiceExtension
        excludes:
          - "Info.plist"
          - "NotificationServiceExtension.entitlements"
      # Shared core sources (compiled into both targets)
      - path: SkaldInbox/Core/Crypto/CryptoConstants.swift
      - path: SkaldInbox/Core/Crypto/KeyManager.swift
      - path: SkaldInbox/Core/Crypto/CryptoEngine.swift
      - path: SkaldInbox/Core/Store/KeychainStore.swift
      - path: SkaldInbox/Core/Model/Payloads.swift
      - path: SkaldInbox/Core/Model/PairingQR.swift
      - path: SkaldInbox/Resources/Localizable.xcstrings
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.skaldagent.inbox.notification-extension
        PRODUCT_NAME: NotificationServiceExtension
        INFOPLIST_FILE: NotificationServiceExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: NotificationServiceExtension/NotificationServiceExtension.entitlements
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"

  SkaldTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SkaldInboxTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.skaldagent.inbox.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - target: Skald
        embed: false
